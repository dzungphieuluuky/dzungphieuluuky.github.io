<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>404 | Lost in space</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: radial-gradient(circle at 30% 10%, #0a0f1e, #03060c);
      min-height: 100vh;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* main content panel – glassmorphic overlay */
    .content {
      position: relative;
      z-index: 20;
      text-align: center;
      background: rgba(8, 14, 26, 0.65);
      backdrop-filter: blur(16px);
      border-radius: 2.5rem;
      padding: 2rem 2.8rem;
      border: 1px solid rgba(80, 140, 255, 0.35);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(100, 160, 255, 0.15);
      animation: fadeSlideUp 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      max-width: 90%;
      width: 580px;
    }

    @keyframes fadeSlideUp {
      0% {
        opacity: 0;
        transform: translateY(30px) scale(0.96);
        backdrop-filter: blur(0);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        backdrop-filter: blur(16px);
      }
    }

    .error-code {
      font-size: clamp(4rem, 15vw, 8rem);
      font-weight: 800;
      background: linear-gradient(135deg, #ffffff, #aac9ff, #7c5eff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 2px 15px rgba(0, 0, 0, 0.3);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .title {
      font-size: clamp(1.2rem, 5vw, 1.8rem);
      font-weight: 500;
      margin: 0.75rem 0 1rem;
      color: #eef4ff;
      letter-spacing: -0.2px;
    }

    .lost-notification {
      background: rgba(255, 90, 90, 0.18);
      border-left: 3px solid #ff7b72;
      padding: 0.75rem 1rem;
      border-radius: 1rem;
      margin: 1.5rem 0;
      font-size: 0.9rem;
      font-weight: 450;
      color: #ffc9c9;
      backdrop-filter: blur(4px);
      display: inline-block;
      max-width: 320px;
    }

    .lost-notification span {
      font-weight: 600;
      color: #ffa69e;
    }

    .description {
      font-size: 0.9rem;
      color: #b8ceff;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(90, 150, 255, 0.7);
      padding: 0.75rem 2rem;
      border-radius: 2.5rem;
      font-weight: 500;
      font-size: 0.9rem;
      color: #eef4ff;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: inherit;
      backdrop-filter: blur(4px);
    }

    .back-btn:hover {
      background: rgba(70, 120, 255, 0.35);
      border-color: #b0d4ff;
      transform: scale(1.02);
      box-shadow: 0 0 12px rgba(70, 140, 255, 0.5);
    }

    /* floating particle / ambient effect (decorative) */
    .ambient-dots {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .content {
        padding: 1.5rem 1.5rem;
        width: 85%;
      }
      .lost-notification {
        font-size: 0.8rem;
        padding: 0.6rem 0.9rem;
      }
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- Canvas for bouncing shapes animation -->
  <canvas id="bounceCanvas"></canvas>

  <!-- Central UI overlay -->
  <div class="content">
    <div class="error-code">404</div>
    <div class="title">you seem to have drifted away</div>
    
    <div class="lost-notification">
      ⚡ <span>Ooops!</span> — It seems you have lost, my friend.<br>
    </div>
    
    <div class="description">
      The universe of this URL is empty. Let's bring you back home.
    </div>
    
    <button class="back-btn" onclick="window.location='/'">⟳ return to home</button>
  </div>

  <script>
    (function() {
      // --- get canvas and context
      const canvas = document.getElementById('bounceCanvas');
      const ctx = canvas.getContext('2d');
      
      let width, height;
      
      // --- define the four shapes: circle, square, triangle, rectangle
      // each shape will have: x, y, vx, vy, size (width/height), color, type
      
      const shapes = [];
      
      // helper random range
      function rand(min, max) {
        return min + Math.random() * (max - min);
      }
      
      // initialize shapes with random positions, velocities, sizes
      function initShapes(w, h) {
        shapes.length = 0;
        
        // 1. Circle
        shapes.push({
          type: 'circle',
          x: rand(80, w - 80),
          y: rand(80, h - 80),
          vx: rand(1.2, 2.8) * (Math.random() > 0.5 ? 1 : -1),
          vy: rand(1.2, 2.8) * (Math.random() > 0.5 ? 1 : -1),
          radius: rand(22, 42),
          color: '#3b82f6',   // blue
          glow: '#3b82f680'
        });
        
        // 2. Square (equal sides)
        let sqSize = rand(35, 55);
        shapes.push({
          type: 'square',
          x: rand(80, w - 80),
          y: rand(80, h - 80),
          vx: rand(1.0, 2.5) * (Math.random() > 0.5 ? 1 : -1),
          vy: rand(1.0, 2.5) * (Math.random() > 0.5 ? 1 : -1),
          size: sqSize,
          width: sqSize,
          height: sqSize,
          color: '#ec489a',   // pink
          glow: '#ec489a80'
        });
        
        // 3. Triangle (equilateral approx)
        let triBase = rand(38, 58);
        shapes.push({
          type: 'triangle',
          x: rand(80, w - 80),
          y: rand(80, h - 80),
          vx: rand(1.1, 2.7) * (Math.random() > 0.5 ? 1 : -1),
          vy: rand(1.1, 2.7) * (Math.random() > 0.5 ? 1 : -1),
          size: triBase,      // base length
          color: '#f59e0b',   // amber
          glow: '#f59e0b80'
        });
        
        // 4. Rectangle (width > height)
        let rectW = rand(50, 75);
        let rectH = rand(30, 48);
        shapes.push({
          type: 'rectangle',
          x: rand(80, w - 80),
          y: rand(80, h - 80),
          vx: rand(1.0, 2.6) * (Math.random() > 0.5 ? 1 : -1),
          vy: rand(1.0, 2.6) * (Math.random() > 0.5 ? 1 : -1),
          width: rectW,
          height: rectH,
          color: '#10b981',   // emerald
          glow: '#10b98180'
        });
      }
      
      // --- drawing functions
      function drawCircle(x, y, radius, color, glowColor) {
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.shadowColor = glowColor;
        ctx.shadowBlur = 18;
        ctx.fill();
        ctx.shadowBlur = 0;
        // subtle inner highlight
        ctx.beginPath();
        ctx.arc(x - 2, y - 2, radius * 0.2, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffffaa';
        ctx.fill();
      }
      
      function drawSquare(x, y, size, color, glowColor) {
        ctx.shadowColor = glowColor;
        ctx.shadowBlur = 18;
        ctx.fillStyle = color;
        ctx.fillRect(x - size/2, y - size/2, size, size);
        ctx.shadowBlur = 0;
        // corner shine
        ctx.fillStyle = '#ffffffaa';
        ctx.fillRect(x - size/2 + 4, y - size/2 + 4, size * 0.2, size * 0.2);
      }
      
      function drawRectangle(x, y, w, h, color, glowColor) {
        ctx.shadowColor = glowColor;
        ctx.shadowBlur = 18;
        ctx.fillStyle = color;
        ctx.fillRect(x - w/2, y - h/2, w, h);
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#ffffffaa';
        ctx.fillRect(x - w/2 + 5, y - h/2 + 5, w * 0.15, h * 0.15);
      }
      
      function drawTriangle(x, y, baseLen, color, glowColor) {
        // equilateral triangle, base horizontal, apex up
        const halfBase = baseLen / 2;
        const heightTri = Math.sqrt(3) / 2 * baseLen;
        ctx.shadowColor = glowColor;
        ctx.shadowBlur = 18;
        ctx.beginPath();
        ctx.moveTo(x, y - heightTri/2);                 // top vertex
        ctx.lineTo(x - halfBase, y + heightTri/2);     // bottom left
        ctx.lineTo(x + halfBase, y + heightTri/2);     // bottom right
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
        ctx.shadowBlur = 0;
        // small shine spot
        ctx.beginPath();
        ctx.arc(x - 3, y - heightTri/3, baseLen * 0.08, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffffcc';
        ctx.fill();
      }
      
      // --- update positions + boundary collision (bounce against 4 walls)
      function updateShapes(w, h) {
        for (let s of shapes) {
          s.x += s.vx;
          s.y += s.vy;
          
          // bounding radius / half-dimensions for collision
          let leftBound = 0, rightBound = w, topBound = 0, bottomBound = h;
          let margin = 0;
          
          if (s.type === 'circle') {
            let r = s.radius;
            if (s.x - r <= leftBound) { s.x = leftBound + r; s.vx = -s.vx; }
            if (s.x + r >= rightBound) { s.x = rightBound - r; s.vx = -s.vx; }
            if (s.y - r <= topBound) { s.y = topBound + r; s.vy = -s.vy; }
            if (s.y + r >= bottomBound) { s.y = bottomBound - r; s.vy = -s.vy; }
          } 
          else if (s.type === 'square') {
            let half = s.size / 2;
            if (s.x - half <= leftBound) { s.x = leftBound + half; s.vx = -s.vx; }
            if (s.x + half >= rightBound) { s.x = rightBound - half; s.vx = -s.vx; }
            if (s.y - half <= topBound) { s.y = topBound + half; s.vy = -s.vy; }
            if (s.y + half >= bottomBound) { s.y = bottomBound - half; s.vy = -s.vy; }
          }
          else if (s.type === 'rectangle') {
            let halfW = s.width / 2;
            let halfH = s.height / 2;
            if (s.x - halfW <= leftBound) { s.x = leftBound + halfW; s.vx = -s.vx; }
            if (s.x + halfW >= rightBound) { s.x = rightBound - halfW; s.vx = -s.vx; }
            if (s.y - halfH <= topBound) { s.y = topBound + halfH; s.vy = -s.vy; }
            if (s.y + halfH >= bottomBound) { s.y = bottomBound - halfH; s.vy = -s.vy; }
          }
          else if (s.type === 'triangle') {
            let base = s.size;
            let halfBase = base / 2;
            let heightTri = Math.sqrt(3) / 2 * base;
            // approximate collision box: we use the centroid motion plus half extents
            let leftExt = halfBase;
            let rightExt = halfBase;
            let topExt = heightTri / 2;
            let bottomExt = heightTri / 2;
            if (s.x - leftExt <= leftBound) { s.x = leftBound + leftExt; s.vx = -s.vx; }
            if (s.x + rightExt >= rightBound) { s.x = rightBound - rightExt; s.vx = -s.vx; }
            if (s.y - topExt <= topBound) { s.y = topBound + topExt; s.vy = -s.vy; }
            if (s.y + bottomExt >= bottomBound) { s.y = bottomBound - bottomExt; s.vy = -s.vy; }
          }
        }
      }
      
      // --- drawing all shapes
      function drawBackgroundAndShapes() {
        // clear canvas with gradient background (smooth)
        const grad = ctx.createLinearGradient(0, 0, width, height);
        grad.addColorStop(0, '#050a17');
        grad.addColorStop(1, '#0e1625');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);
        
        // decorative tiny grid lines (subtle)
        ctx.strokeStyle = '#1e2a44';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < width; i += 55) {
          ctx.beginPath();
          ctx.moveTo(i, 0);
          ctx.lineTo(i, height);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, i % height);
          ctx.lineTo(width, i % height);
          ctx.stroke();
        }
        
        // draw each shape with glow effect
        for (let s of shapes) {
          ctx.save();
          ctx.shadowBlur = 22;
          ctx.shadowColor = s.glow;
          if (s.type === 'circle') {
            drawCircle(s.x, s.y, s.radius, s.color, s.glow);
          } else if (s.type === 'square') {
            drawSquare(s.x, s.y, s.size, s.color, s.glow);
          } else if (s.type === 'rectangle') {
            drawRectangle(s.x, s.y, s.width, s.height, s.color, s.glow);
          } else if (s.type === 'triangle') {
            drawTriangle(s.x, s.y, s.size, s.color, s.glow);
          }
          ctx.restore();
        }
        
        // add floating particles for extra "lost in space" vibe
        ctx.fillStyle = '#a0b8ff30';
        for (let i = 0; i < 180; i++) {
          if (i%2 === 0) continue; // random but deterministic distribution just for style
          let px = (i * 131) % width;
          let py = (i * 253) % height;
          ctx.beginPath();
          ctx.arc(px, py, 1.2, 0, Math.PI*2);
          ctx.fill();
        }
      }
      
      // --- animation loop & resize handling
      let animFrame;
      
      function animate() {
        if (!width || !height) return;
        updateShapes(width, height);
        drawBackgroundAndShapes();
        animFrame = requestAnimationFrame(animate);
      }
      
      function setupCanvasAndResize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        
        // reposition shapes if they are out of new bounds (soft reset positions)
        for (let s of shapes) {
          let marginCheck = 40;
          if (s.x < marginCheck || s.x > width - marginCheck || s.y < marginCheck || s.y > height - marginCheck) {
            s.x = rand(marginCheck, width - marginCheck);
            s.y = rand(marginCheck, height - marginCheck);
          }
          // ensure velocities are not zero
          if (Math.abs(s.vx) < 0.5) s.vx = (Math.random() - 0.5) * 2;
          if (Math.abs(s.vy) < 0.5) s.vy = (Math.random() - 0.5) * 2;
        }
      }
      
      function handleResize() {
        setupCanvasAndResize();
      }
      
      // initialize all
      function init() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        initShapes(width, height);
        setupCanvasAndResize();
        animate();
        window.addEventListener('resize', () => {
          handleResize();
          // reinitialize shapes positions relative to new dimensions? yes, but keep velocities
          for (let s of shapes) {
            const margin = 60;
            s.x = Math.min(Math.max(s.x, margin), width - margin);
            s.y = Math.min(Math.max(s.y, margin), height - margin);
          }
        });
      }
      
      init();
    })();
  </script>
</body>
</html>
